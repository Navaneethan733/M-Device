<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Stackly Medical</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="animations.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/webp" href="Asset/favicon.webp" />
  </head>
  <body>
  <div id="preloader">
    <div class="preloader-inner">
      <div class="preloader-ripple"></div>
      <div class="preloader-ripple"></div>
      <img src="Asset/logo.webp" alt="Loading..." class="preloader-logo">
    </div>
    <div class="preloader-bar"><div class="preloader-bar-fill"></div></div>
  </div>
    
  <section class="split-login-container">
    <div class="login-left">
      <div class="return-home-container">
        <a href="index.html" class="return-home-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          <span>Return Home</span>
        </a>
      </div>
      <div class="login-header">
        <a href="index.html" class="login-logo">
          <img src="Asset/logo.webp" alt="Stackly Logo" />
        </a>
      </div>
      
      <div class="login-content reveal">
        <h1>Welcome back</h1>
        <p class="auth-subtitle">Please enter your details</p>
        
        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="Enter your email" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required />
          </div>
          
          <div class="form-actions">
            <label class="remember-me">
              <input type="checkbox" /> <span>Remember for 30 days</span>
            </label>
            <a href="#" class="forgot-password">Forgot password</a>
          </div>
          
          <button type="submit" class="submit-btn auth-btn primary-auth-btn">Sign in</button>
          <button type="button" class="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
            Sign in with Google
          </button>
        </form>
        
        <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
      </div>
    </div>
    
    <div class="login-right" style="background-image: url('Asset/login-vibe.png');">
      <!-- Illustration background via CSS/Inline Style -->
    </div>
  </section>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/SplitText.min.js"></script>
<script src="script.js"></script>
  </body>
</html>
